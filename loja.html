<!DOCTYPE HTML>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" type="text/css">
  </head>
  
  <body>
    <div id="pagina_entrada">
      <h1 id="titulo">VENDINHA DO CALOVE</h1>
      
      <div class="produtos-grid">
        <!-- Produto 1 -->
        <div class="produto">
          <img src="produtos/mentos.png" alt="Mentos">
          <h3>Mentos Caixa Sabores</h3>
          <div class="preco">R$ 2,50</div>
          <button class="comprar-btn" onclick="comprar('Mentos Caixa Sabores - R$2,50', '4194.1234.5678-90')">Comprar</button>
        </div>
        
        <!-- Produto 2 -->
        <div class="produto">
          <img src="produtos/coca.png" alt="Refrigerante">
          <h3>Coca Lata Sabores</h3>
          <div class="preco">R$ 6,00</div>
          <button class="comprar-btn" onclick="comprar('Coca Lata Sabores - R$6,00', '4194.1234.5678-90')">Comprar</button>
        </div>
        
        <!-- Produto 3 -->
        <div class="produto">
          <img src="produtos/freegells.png" alt="Freegells">
          <h3>Freegells</h3>
          <div class="preco">R$ 4,00</div>
          <button class="comprar-btn" onclick="comprar('Freegells - R$2,00', '4194.1234.5678-90')">Comprar</button>
        </div>
        
        <!-- Produto 4 -->
        <div class="produto">
          <img src="produtos/mentos 2.png" alt="Cigarro">
          <h3>Mentos Chiclete</h3>
          <div class="preco">R$ 12,00</div>
          <button class="comprar-btn" onclick="comprar('Mentos Chiclete - R$2,00', '4194.1234.5678-90')">Comprar</button>
        </div>
        
        <!-- Produto 5 -->
        <div class="produto">
          <img src="C:\Users\Filipe\Documents\GitHub\VendinhaCA\produtos\amendoim.png" alt="Água">
          <h3>Amendoim</h3>
          <div class="preco">R$ 2,00</div>
          <button class="comprar-btn" onclick="comprar('Amendoim - R$2,00', '4194.1234.5678-90')">Comprar</button>
        </div>
        
        <!-- Produto 6 -->
        <div class="produto">
          <img src="C:\Users\Filipe\Documents\GitHub\VendinhaCA\produtos\nutry.png" alt="Combo">
          <h3>Barra de Cereal</h3>
          <div class="preco">R$ 15,00</div>
          <button class="comprar-btn" onclick="comprar('Barra de Cereal - R$2,50', '4194.1234.5678-90')">Comprar</button>
        </div>
      </div>
    </div>

    <!-- Overlay e Popup -->
    <div id="overlay" onclick="fecharPopup()"></div>
    <div id="popup">
      <h3>✅ PIX Copiado!</h3>
      <p>Chave copiada para área de transferência.<br>Faça o pagamento e envie comprovante!</p>
      <p><strong>Chave PIX:</strong><br>4194.1234.5678-90</p>
      <button class="comprar-btn" onclick="fecharPopup()">OK</button>
    </div>

    <script>
      function comprar(produto, chavePix) {
        const texto = `PIX para ${produto}\nChave: ${chavePix}`;
        
        // Copia para área de transferência
        navigator.clipboard.writeText(texto).then(() => {
          document.getElementById('popup').style.display = 'block';
          document.getElementById('overlay').style.display = 'block';
        }).catch(() => {
          alert('Erro ao copiar PIX. Copie manualmente: ' + texto);
        });
      }
      
      function fecharPopup() {
        document.getElementById('popup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
      }
    </script>
    
    <!-- Botão config mantido -->
    <a href="config_page.html" class="config_button_button">
      <img src="media/config_button.png" class="config_button_image">
    </a>
  </body>
</html>
